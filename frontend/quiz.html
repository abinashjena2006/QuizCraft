<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuizCraft Quiz</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      min-height:100vh;
      background:linear-gradient(135deg,#0f172a,#1e1b4b,#312e81);
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .quiz-container{
      width:100%;
      max-width:700px;
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(12px);
      border-radius:25px;
      padding:35px;
      box-shadow:0 0 25px rgba(0,0,0,0.4);
    }

    .top-bar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:25px;
    }

    .question-count{
      font-size:18px;
      color:#38bdf8;
      font-weight:bold;
    }

    .timer{
      background:#ef4444;
      padding:10px 18px;
      border-radius:10px;
      font-weight:bold;
      animation:pulse 1s infinite;
    }

    @keyframes pulse{
      0%{
        transform:scale(1);
      }
      50%{
        transform:scale(1.05);
      }
      100%{
        transform:scale(1);
      }
    }

    .progress-bar{
      width:100%;
      height:10px;
      background:rgba(255,255,255,0.1);
      border-radius:10px;
      overflow:hidden;
      margin-bottom:30px;
    }

    .progress{
      width:40%;
      height:100%;
      background:#38bdf8;
    }

    .question{
      font-size:28px;
      margin-bottom:30px;
      line-height:1.5;
    }

    .options{
      display:flex;
      flex-direction:column;
      gap:18px;
    }

    .option{
      padding:18px;
      background:rgba(255,255,255,0.08);
      border-radius:15px;
      cursor:pointer;
      transition:0.3s;
      border:2px solid transparent;
    }

    .option:hover{
      transform:translateX(8px);
      border-color:#38bdf8;
      background:rgba(56,189,248,0.15);
    }

    .bottom{
      margin-top:35px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .score{
      color:#cbd5e1;
      font-size:16px;
    }

    .next-btn{
      padding:14px 30px;
      border:none;
      border-radius:12px;
      background:#38bdf8;
      color:black;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
    }

    .next-btn:hover{
      background:white;
      transform:scale(1.05);
    }

    @media(max-width:700px){

      .question{
        font-size:22px;
      }

      .quiz-container{
        padding:25px;
      }

      .top-bar{
        flex-direction:column;
        gap:15px;
      }

      .bottom{
        flex-direction:column;
        gap:20px;
      }

    }

  </style>

</head>
<body>

  <div class="quiz-container">

    <div class="top-bar">

      <div class="question-count">
        Question 4 / 10
      </div>

      <div class="timer">
        ⏳ 00:25
      </div>

    </div>

    <div class="progress-bar">
      <div class="progress"></div>
    </div>

    <div class="question">
      Which language is primarily used for modern web development?
    </div>

    <div class="options">

      <div class="option">
        A. Python
      </div>

      <div class="option">
        B. JavaScript
      </div>

      <div class="option">
        C. C Language
      </div>

      <div class="option">
        D. Assembly Language
      </div>

    </div>

    <div class="bottom">

      <div class="score">
        Current Score: 30
      </div>

      <button class="next-btn">
        Next Question →
      </button>

    </div>

  </div>

</body>
</html>
