<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuizCraft Quiz</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      min-height:100vh;
      background:linear-gradient(135deg,#0f172a,#1e1b4b,#312e81);
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .quiz-container{
      width:100%;
      max-width:700px;
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(12px);
      border-radius:25px;
      padding:35px;
      box-shadow:0 0 25px rgba(0,0,0,0.4);
    }

    .top-bar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:25px;
    }

    .question-count{
      font-size:18px;
      color:#38bdf8;
      font-weight:bold;
    }

    .timer{
      background:#ef4444;
      padding:10px 18px;
      border-radius:10px;
      font-weight:bold;
    }

    .progress-bar{
      width:100%;
      height:10px;
      background:rgba(255,255,255,0.1);
      border-radius:10px;
      overflow:hidden;
      margin-bottom:30px;
    }

    .progress{
      height:100%;
      background:#38bdf8;
      width:0%;
      transition:0.3s;
    }

    .question{
      font-size:28px;
      margin-bottom:30px;
      line-height:1.5;
    }

    .options{
      display:flex;
      flex-direction:column;
      gap:18px;
    }

    .option{
      padding:18px;
      background:rgba(255,255,255,0.08);
      border-radius:15px;
      cursor:pointer;
      transition:0.3s;
      border:2px solid transparent;
    }

    .option:hover{
      transform:translateX(8px);
      border-color:#38bdf8;
      background:rgba(56,189,248,0.15);
    }

    .option.correct{
      background:#22c55e;
      color:black;
    }

    .option.wrong{
      background:#ef4444;
    }

    .bottom{
      margin-top:35px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .score{
      color:#cbd5e1;
      font-size:16px;
    }

    .next-btn{
      padding:14px 30px;
      border:none;
      border-radius:12px;
      background:#38bdf8;
      color:black;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
    }

    .next-btn:hover{
      background:white;
      transform:scale(1.05);
    }

    @media(max-width:700px){

      .question{
        font-size:22px;
      }

      .quiz-container{
        padding:25px;
      }

      .top-bar{
        flex-direction:column;
        gap:15px;
      }

      .bottom{
        flex-direction:column;
        gap:20px;
      }

    }

  </style>

</head>
<body>

  <div class="quiz-container">

    <div class="top-bar">

      <div class="question-count" id="question-count">
        Question 1 / 5
      </div>

      <div class="timer" id="timer">
        ⏳ 15
      </div>

    </div>

    <div class="progress-bar">
      <div class="progress" id="progress"></div>
    </div>

    <div class="question" id="question">
      Question Here
    </div>

    <div class="options" id="options">
    </div>

    <div class="bottom">

      <div class="score" id="score">
        Score: 0
      </div>

      <button class="next-btn" id="nextBtn">
        Next →
      </button>

    </div>

  </div>

  <script>

    const quizData = [

      {
        question: "Which language is used for web development?",
        options: ["Python","JavaScript","C","Java"],
        answer: "JavaScript"
      },

      {
        question: "Which database is used in this project?",
        options: ["MongoDB","Firebase","MySQL","Oracle"],
        answer: "MySQL"
      },

      {
        question: "What does HTML stand for?",
        options: [
          "Hyper Text Markup Language",
          "HighText Machine Language",
          "Hyper Transfer Markup Language",
          "None"
        ],
        answer: "Hyper Text Markup Language"
      },

      {
        question: "Which language is used for backend here?",
        options: ["Python Flask","C++","PHP","Ruby"],
        answer: "Python Flask"
      },

      {
        question: "Which tag is used for button in HTML?",
        options: ["<button>","<btn>","<click>","<input>"],
        answer: "<button>"
      }

    ];

    let currentQuestion = 0;
    let score = 0;
    let timeLeft = 15;
   const correctSound = new Audio(
"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"
);

const wrongSound = new Audio(
"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"
);

correctSound.volume = 0.1;
wrongSound.volume = 0.1;

    const questionEl = document.getElementById("question");
    const optionsEl = document.getElementById("options");
    const scoreEl = document.getElementById("score");
    const nextBtn = document.getElementById("nextBtn");
    const progressEl = document.getElementById("progress");
    const questionCount = document.getElementById("question-count");
    const timerEl = document.getElementById("timer");

    function loadQuestion(){

      clearInterval(timer);

      timeLeft = 15;
      timerEl.innerHTML = "⏳ " + timeLeft;

      timer = setInterval(() => {

        timeLeft--;

        timerEl.innerHTML = "⏳ " + timeLeft;

        if(timeLeft <= 0){
          clearInterval(timer);
          nextQuestion();
        }

      },1000);

      const currentQuiz = quizData[currentQuestion];

      questionEl.innerText = currentQuiz.question;

      questionCount.innerText =
      `Question ${currentQuestion + 1} / ${quizData.length}`;

      progressEl.style.width =
      ((currentQuestion) / quizData.length) * 100 + "%";

      optionsEl.innerHTML = "";

      currentQuiz.options.forEach(option => {

        const div = document.createElement("div");

        div.innerText = option;

        div.classList.add("option");

        div.addEventListener("click", () => selectAnswer(div, option));

        optionsEl.appendChild(div);

      });

    }

    function selectAnswer(element, selected){

      clearInterval(timer);

      const correctAnswer = quizData[currentQuestion].answer;

      const options = document.querySelectorAll(".option");

      options.forEach(option => {

        option.style.pointerEvents = "none";

        if(option.innerText === correctAnswer){
          option.classList.add("correct");
        }

      });

      if(selected === correctAnswer){
        correctSound.currentTime = 0;
correctSound.play();

        score += 10;

        element.classList.add("correct");

      }else{

        wrongSound.currentTime = 0;
wrongSound.play();

        element.classList.add("wrong");

      }

      scoreEl.innerText = "Score: " + score;

    }

    function nextQuestion(){

      currentQuestion++;

      if(currentQuestion < quizData.length){

        loadQuestion();

      }else{

        localStorage.setItem("quizScore", score);

        window.location.href = "result.html";

      }

    }

    nextBtn.addEventListener("click", nextQuestion);

    loadQuestion();

  </script>

</body>
</html>
