<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuizCraft Login</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#0f172a,#1e1b4b,#312e81);
      overflow:hidden;
      position:relative;
    }

    body::before{
      content:'';
      position:absolute;
      width:400px;
      height:400px;
      background:#38bdf8;
      border-radius:50%;
      top:-100px;
      left:-100px;
      filter:blur(120px);
      opacity:0.5;
    }

    body::after{
      content:'';
      position:absolute;
      width:350px;
      height:350px;
      background:#8b5cf6;
      border-radius:50%;
      bottom:-100px;
      right:-100px;
      filter:blur(120px);
      opacity:0.5;
    }

    .login-box{
      width:380px;
      padding:40px;
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.1);
      backdrop-filter:blur(15px);
      border-radius:25px;
      box-shadow:0 0 30px rgba(0,0,0,0.4);
      color:white;
      z-index:10;
    }

    .login-box h1{
      text-align:center;
      margin-bottom:10px;
      color:#38bdf8;
    }

    .login-box p{
      text-align:center;
      margin-bottom:30px;
      color:#cbd5e1;
    }

    .input-box{
      margin-bottom:20px;
    }

    .input-box input{
      width:100%;
      padding:15px;
      border:none;
      outline:none;
      border-radius:12px;
      background:rgba(255,255,255,0.1);
      color:white;
      font-size:16px;
    }

    .input-box input::placeholder{
      color:#cbd5e1;
    }

    .remember{
      display:flex;
      justify-content:space-between;
      font-size:14px;
      margin-bottom:20px;
      color:#cbd5e1;
    }

    .remember a{
      color:#38bdf8;
      text-decoration:none;
    }

    .btn{
      width:100%;
      padding:15px;
      border:none;
      border-radius:12px;
      background:#38bdf8;
      color:black;
      font-size:18px;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
    }

    .btn:hover{
      background:white;
      transform:scale(1.03);
    }

    .social{
      margin-top:25px;
      text-align:center;
    }

    .social-icons{
      display:flex;
      justify-content:center;
      gap:15px;
      margin-top:15px;
    }

    .icon{
      width:45px;
      height:45px;
      border-radius:50%;
      background:rgba(255,255,255,0.1);
      display:flex;
      justify-content:center;
      align-items:center;
      font-size:20px;
      cursor:pointer;
      transition:0.3s;
    }

    .icon:hover{
      background:#38bdf8;
      color:black;
      transform:translateY(-5px);
    }

    .signup{
      text-align:center;
      margin-top:25px;
      color:#cbd5e1;
    }

    .signup a{
      color:#38bdf8;
      text-decoration:none;
      font-weight:bold;
    }

  </style>

</head>
<body>

  <div class="login-box">

    <h1>QuizCraft</h1>

    <p>Login to continue your quiz journey 🚀</p>

    <div class="input-box">
      <input type="email" placeholder="Enter your email">
    </div>

    <div class="input-box">
      <input type="password" placeholder="Enter your password">
    </div>

    <div class="remember">
      <label>
        <input type="checkbox">
        Remember me
      </label>

      <a href="#">Forgot Password?</a>
    </div>

    <a href="quiz.html">
  <button class="btn">Login</button>
</a>

    <div class="social">

      <p>Or continue with</p>

      <div class="social-icons">
        <div class="icon">G</div>
        <div class="icon">f</div>
        <div class="icon">X</div>
      </div>

    </div>

    <div class="signup">
      Don't have an account?
      <a href="#">Sign Up</a>
    </div>

  </div>

</body>
</html>
