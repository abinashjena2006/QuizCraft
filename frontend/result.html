<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Result</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#0f172a,#1e1b4b,#312e81);
      color:white;
      overflow:hidden;
      padding:20px;
    }

    .result-box{
      width:100%;
      max-width:500px;
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(15px);
      border-radius:30px;
      padding:40px;
      text-align:center;
      box-shadow:0 0 30px rgba(0,0,0,0.4);
      animation:fadeIn 1s ease;
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(30px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    h1{
      color:#38bdf8;
      margin-bottom:30px;
      font-size:38px;
    }

    .circle{
      width:220px;
      height:220px;
      margin:0 auto 30px;
      border-radius:50%;
      background:conic-gradient(
        #38bdf8 0% 80%,
        rgba(255,255,255,0.1) 80% 100%
      );
      display:flex;
      justify-content:center;
      align-items:center;
      position:relative;
      box-shadow:0 0 30px rgba(56,189,248,0.4);
    }

    .circle::before{
      content:'';
      position:absolute;
      width:170px;
      height:170px;
      background:#111827;
      border-radius:50%;
    }

    .score{
      position:relative;
      z-index:2;
    }

    .score h2{
      font-size:55px;
      color:#38bdf8;
    }

    .score p{
      color:#cbd5e1;
      margin-top:5px;
    }

    .message{
      font-size:24px;
      margin-bottom:25px;
      color:#f8fafc;
    }

    .stats{
      display:flex;
      justify-content:space-around;
      margin-bottom:35px;
      flex-wrap:wrap;
      gap:20px;
    }

    .stat-box{
      background:rgba(255,255,255,0.08);
      padding:20px;
      border-radius:18px;
      width:120px;
    }

    .stat-box h3{
      color:#38bdf8;
      margin-bottom:8px;
      font-size:28px;
    }

    .btn{
      padding:16px 35px;
      border:none;
      border-radius:14px;
      background:#38bdf8;
      color:black;
      font-size:18px;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
    }

    .btn:hover{
      background:white;
      transform:scale(1.05);
    }

    @media(max-width:600px){

      .circle{
        width:180px;
        height:180px;
      }

      .circle::before{
        width:140px;
        height:140px;
      }

      .score h2{
        font-size:42px;
      }

      h1{
        font-size:30px;
      }

    }

  </style>

</head>
<body>

  <div class="result-box">

    <h1>🎉 Quiz Completed</h1>

    <div class="circle">

      <div class="score">
        <h2>80%</h2>
        <p>Your Score</p>
      </div>

    </div>

    <div class="message">
      Excellent Performance 🚀
    </div>

    <div class="stats">

      <div class="stat-box">
        <h3>8</h3>
        <p>Correct</p>
      </div>

      <div class="stat-box">
        <h3>2</h3>
        <p>Wrong</p>
      </div>

      <div class="stat-box">
        <h3>10</h3>
        <p>Total</p>
      </div>

    </div>

    <button class="btn">
      Restart Quiz
    </button>

  </div>

</body>
</html>
