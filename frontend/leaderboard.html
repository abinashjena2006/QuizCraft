<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuizCraft Leaderboard</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      min-height:100vh;
      background:linear-gradient(135deg,#0f172a,#1e1b4b,#312e81);
      color:white;
      padding:40px 20px;
    }

    h1{
      text-align:center;
      font-size:45px;
      margin-bottom:40px;
      color:#38bdf8;
    }

    .leaderboard{
      max-width:850px;
      margin:auto;
      display:flex;
      flex-direction:column;
      gap:20px;
    }

    .player{
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(12px);
      border-radius:20px;
      padding:20px 25px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      transition:0.3s;
      border:1px solid rgba(255,255,255,0.08);
    }

    .player:hover{
      transform:translateY(-5px);
      box-shadow:0 0 20px rgba(56,189,248,0.3);
    }

    .left{
      display:flex;
      align-items:center;
      gap:20px;
    }

    .rank{
      font-size:28px;
      font-weight:bold;
      width:50px;
      text-align:center;
    }

    .gold{
      color:#facc15;
    }

    .silver{
      color:#cbd5e1;
    }

    .bronze{
      color:#fb923c;
    }

    .avatar{
      width:60px;
      height:60px;
      border-radius:50%;
      background:#38bdf8;
      display:flex;
      justify-content:center;
      align-items:center;
      font-size:24px;
      font-weight:bold;
      color:black;
    }

    .info h2{
      margin-bottom:5px;
      font-size:22px;
    }

    .info p{
      color:#cbd5e1;
      font-size:14px;
    }

    .score{
      background:#38bdf8;
      color:black;
      padding:12px 22px;
      border-radius:12px;
      font-size:18px;
      font-weight:bold;
    }

    @media(max-width:700px){

      .player{
        flex-direction:column;
        gap:20px;
        text-align:center;
      }

      .left{
        flex-direction:column;
      }

      h1{
        font-size:34px;
      }

    }

  </style>

</head>
<body>

  <h1>🏆 Leaderboard</h1>

  <div class="leaderboard">

    <div class="player">

      <div class="left">

        <div class="rank gold">
          🥇
        </div>

        <div class="avatar">
          AJ
        </div>

        <div class="info">
          <h2>Abinash Jena</h2>
          <p>Top Performer</p>
        </div>

      </div>

      <div class="score">
        980 pts
      </div>

    </div>

    <div class="player">

      <div class="left">

        <div class="rank silver">
          🥈
        </div>

        <div class="avatar">
          RK
        </div>

        <div class="info">
          <h2>Rahul Kumar</h2>
          <p>Quiz Expert</p>
        </div>

      </div>

      <div class="score">
        920 pts
      </div>

    </div>

    <div class="player">

      <div class="left">

        <div class="rank bronze">
          🥉
        </div>

        <div class="avatar">
          SP
        </div>

        <div class="info">
          <h2>Sneha Patel</h2>
          <p>Fast Learner</p>
        </div>

      </div>

      <div class="score">
        870 pts
      </div>

    </div>

    <div class="player">

      <div class="left">

        <div class="rank">
          4
        </div>

        <div class="avatar">
          AD
        </div>

        <div class="info">
          <h2>Aditya Roy</h2>
          <p>Active Participant</p>
        </div>

      </div>

      <div class="score">
        820 pts
      </div>

    </div>

    <div class="player">

      <div class="left">

        <div class="rank">
          5
        </div>

        <div class="avatar">
          PK
        </div>

        <div class="info">
          <h2>Priya Kumari</h2>
          <p>Quiz Challenger</p>
        </div>

      </div>

      <div class="score">
        790 pts
      </div>

    </div>

  </div>

</body>
</html>
